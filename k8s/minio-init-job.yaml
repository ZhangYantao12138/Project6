# Author: <your name>
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: traffic
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "waiting for minio..."; sleep 3
              done
              mc mb --ignore-existing local/traffic-raw
              echo "Bucket traffic-raw ready."
