# Author: <your name>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: traffic-pipeline:latest
          imagePullPolicy: IfNotPresent
          args: ["webserver"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: traffic
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      nodePort: 30080
