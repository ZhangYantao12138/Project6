# Author: <your name>
# Generate a valid fernet key:
#   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secret
  namespace: traffic
type: Opaque
stringData:
  AIRFLOW__CORE__FERNET_KEY: "your_fernet_key_here"
